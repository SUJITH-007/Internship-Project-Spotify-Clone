<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet", href="style.css">
    <title>Spotify</title>
</head>
<body>
    <header>
        <div id= "logo">
        <img  src="images.png" alt="Logo" width="38" height="38">
        </div>
    </header>
    <h1 id="Welcome" class="Welcome"><b>Welcome back</b></h1>
    <form id="username">
        <label class="username" for="username"><b>Email or username</b></label><br>
        <input type="text" id="username"><br>
        <input type="submit" value="Continue">
    </form>
    <p id="or">or</p>
    <div id="buttons">
        <button class="button"><img class="image" id="phone" src="iphone.png" width="20px" height="20px"><b>continue with phone number</b></button>
        <button class="button"><img class="image" id="google" src="search.png"  width="20px" height="20px"><b>continue with google</b></button>
        <button class="button"><img class="image" id="facebook" src="facebook.png"  width="20px" height="20px"><b>continue with facebook</b></button>
        <button class="button"><img class="image" id="apple" src="apple-logo.png"  width="20px" height="20px"><b>continue with apple</b></button>
    </div>
    
    <p id="dhac">Don't have an account?</p>
    <div id="signup">
        <button class="signup"><b>sign up</b></button>
    </div>
    <div id="terms"><p>This site is protected by reCAPTCHA and the Google <a class="terms" href="https://policies.google.com/privacy">Privacy<br>Policy</a>Privacy 
        and <a class="terms" href="https://policies.google.com/privacy"> Terms of Service</a> apply.</p></div>
</body>
</html>
